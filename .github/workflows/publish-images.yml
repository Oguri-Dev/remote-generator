# Publica las imágenes Docker del sistema en GitHub Container Registry (GHCR).
#
# Disparadores:
#   - push a main            -> actualiza :latest (y un tag sha-<commit> trazable)
#   - tag de versión vX.Y.Z  -> publica la versión inmutable (p. ej. :1.2.0)
#
# Los PCs de producción instalan/actualizan con `docker compose pull` sin
# compilar nada localmente (ver docs/DESPLIEGUE.md).
name: Publicar imagenes Docker

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

# GitHub fuerza Node.js 24 en los runners desde el 2026-06-16; esto lo adopta
# ya mismo para validar que las actions funcionan con esa versión.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - imagen: generador-backend
            contexto: ./BackEnd
            dockerfile: ./BackEnd/Dockerfile
            target: ''
          - imagen: generador-frontend
            contexto: ./FrontEnd
            dockerfile: ./FrontEnd/Dockerfile.production
            target: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular tags de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oguri-dev/${{ matrix.imagen }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.contexto }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.imagen }}
          cache-to: type=gha,mode=max,scope=${{ matrix.imagen }}
