services:
  # ===== MongoDB =====
  mongodb:
    image: mongo:7.0
    container_name: generador-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - generador-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===== MQTT Broker (Mosquitto) =====
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: generador-mqtt
    restart: unless-stopped
    ports:
      - '1883:1883' # Puerto MQTT
      - '9001:9001' # Puerto WebSocket
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - generador-network
    healthcheck:
      test: ['CMD', 'mosquitto_sub', '-t', '$$SYS/#', '-C', '1', '-i', 'healthcheck', '-W', '3']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===== MediaMTX (gateway de cámara RTSP -> HLS) =====
  # Toma el RTSP de la cámara (configurado por el backend vía su API) y lo
  # republica como HLS, que el navegador reproduce con hls.js.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: generador-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    environment:
      # ÚNICA variable que depende del segmento de red de terreno: la IP del
      # servidor por la que el navegador del operador alcanza el vídeo WebRTC
      # (candidatos ICE). MediaMTX permite override por env con prefijo MTX_.
      # En terreno: poner WEBRTC_HOST=<IP del servidor> en .env y reiniciar este
      # contenedor. NO requiere reconstruir nada.
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_HOST:-localhost}
    ports:
      - '8189:8189/udp'  # WebRTC ICE/UDP (debe coincidir con webrtcLocalUDPAddress)
      - '9997:9997'      # API de control (la usa el backend; no exponer fuera de la red en prod)
    networks:
      - generador-network

  # ===== Backend (Go) =====
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    # Imagen preconstruida publicada por GitHub Actions; en producción se obtiene
    # con `docker compose pull`. El build: de arriba sigue sirviendo en desarrollo.
    image: ghcr.io/oguri-dev/generador-backend:latest
    container_name: generador-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: generator
      MONGODB_COLL: config
      PORT: 8099
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      ENVIRONMENT: production
      # Obligatorio: secreto para firmar sesiones (ver .env.docker.example).
      # Con ENVIRONMENT=production las cookies son Secure (requieren HTTPS).
      SESSION_SECRET: ${SESSION_SECRET:?define SESSION_SECRET en tu .env}
      # Obligatorio: clave para cifrar las contraseñas MQTT en reposo (AES-GCM).
      CONFIG_ENC_KEY: ${CONFIG_ENC_KEY:?define CONFIG_ENC_KEY en tu .env}
      # API de MediaMTX para sincronizar la cámara (vacío = sin cámara).
      MEDIAMTX_API: http://mediamtx:9997
    ports:
      - '8099:8099'
    networks:
      - generador-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8099/api/auth/check-setup',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===== Frontend (Vue + Nginx) - Producción =====
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.production
      target: production
    # Imagen preconstruida publicada por GitHub Actions (ver nota del backend).
    image: ghcr.io/oguri-dev/generador-frontend:latest
    container_name: generador-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      mediamtx:
        condition: service_started
    ports:
      - '80:80'
    networks:
      - generador-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===== Frontend SSR (Alternativa) =====
  # Descomenta esta sección si prefieres usar SSR en lugar de Nginx
  # frontend-ssr:
  #   build:
  #     context: ./FrontEnd
  #     dockerfile: Dockerfile.production
  #     target: ssr-production
  #     args:
  #       VITE_API_BASE_URL: http://backend:8099
  #   container_name: generador-frontend-ssr
  #   restart: unless-stopped
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - generador-network

networks:
  generador-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  mqtt_data:
    driver: local
  mqtt_logs:
    driver: local
